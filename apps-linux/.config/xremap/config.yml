keypress_delay_ms: 5

modmap:
  - name: Key remaps
    remap:
      KEY_102ND: Shift_L
      CapsLock: Ctrl_L

keymap:
  - name: Terminal shortcuts (Alt as Cmd)
    application:
      only: [com.mitchellh.ghostty]
    remap:
      # App launcher (Cmd+Space -> Super+Space for Walker)
      Alt-Space: Super-Space
      Alt-Shift-Space: Super-Alt-Space

      # Clipboard (Ctrl+Shift to avoid terminal control chars)
      Alt-c: Ctrl-Shift-c         # copy
      Alt-v: Ctrl-Shift-v         # paste

      # Tab & window management
      Alt-t: Ctrl-Shift-t         # new tab
      Alt-w: Ctrl-Shift-w         # close tab
      Alt-n: Ctrl-Shift-n         # new window
      Alt-q: { launch: ["hyprctl", "dispatch", "killactive"] }

      # Actions
      Alt-a: Ctrl-Shift-a         # select all
      Alt-f: Ctrl-Shift-f         # search
      Alt-g: Ctrl-Shift-g         # next search match
      Alt-k: Ctrl-Shift-k         # clear screen

      # Text editing
      Alt-Backspace: Ctrl-u       # kill line backward (Ctrl+U = \x15)

      # Font size (no terminal conflict)
      Alt-Equal: Ctrl-Equal
      Alt-Minus: Ctrl-Minus
      Alt-0: Ctrl-0

      # Settings
      Alt-Comma: Ctrl-Comma

      # Tab navigation
      Alt-Left: Ctrl-Shift-Left
      Alt-Right: Ctrl-Shift-Right

      # Workspace navigation (Shift+Alt -> Super for Hyprland)
      Shift-Alt-Left: Super-Left
      Shift-Alt-Right: Super-Right

      # Scrollback
      Alt-Up: Ctrl-Shift-Up
      Alt-Down: Ctrl-Shift-Down

      # Window management (routed to Hyprland via Super)
      Alt-h: Super-h               # hide/minimize window
      Alt-m: Super-m               # minimize window
      Alt-Grave: Super-Grave       # cycle windows

      # Fullscreen & mouse
      Alt-Enter: Ctrl-Enter
      Alt-BTN_LEFT: Ctrl-BTN_LEFT

  - name: Spotify shortcuts (Alt as Cmd)
    application:
      only: [spotify]
    remap:
      Alt-q: Ctrl-Shift-q     # quit Spotify (native shortcut)
      Alt-w: Ctrl-Shift-q     # also quit (Spotify has no tabs)
      Alt-h: Super-h           # hide/minimize window
      Alt-m: Super-m           # minimize window
      Alt-Grave: Super-Grave   # cycle windows

  - name: macOS-style shortcuts (Alt as Cmd)
    application:
      not: [com.mitchellh.ghostty, spotify]
    remap:
      # App launcher (Cmd+Space -> Super+Space for Walker)
      Alt-Space: Super-Space
      Alt-Shift-Space: Super-Alt-Space

      # Clipboard
      Alt-c: Ctrl-c          # copy
      Alt-v: Ctrl-v          # paste
      Alt-x: Ctrl-x          # cut

      # Common actions
      Alt-z: Ctrl-z          # undo
      Alt-Shift-z: Ctrl-Shift-z  # redo
      Alt-a: Ctrl-a          # select all
      Alt-f: Ctrl-f          # find
      Alt-s: Ctrl-s          # save
      Alt-Shift-s: Ctrl-Shift-s  # save as
      Alt-o: Ctrl-o          # open file
      Alt-p: Ctrl-p          # print
      Alt-n: Ctrl-n          # new window
      Alt-q: { launch: ["hyprctl", "dispatch", "killactive"] }
      Alt-w: Ctrl-w          # close tab
      Alt-t: Ctrl-t          # new tab
      Alt-Shift-t: Ctrl-Shift-t  # reopen closed tab
      Alt-Shift-n: Ctrl-Shift-n  # new incognito window
      Alt-Comma: Ctrl-Comma  # settings/preferences

      # Text formatting
      Alt-b: Ctrl-b          # bold
      Alt-i: Ctrl-i          # italic
      Alt-u: Ctrl-u          # underline

      # Editor shortcuts
      Alt-Slash: Ctrl-Slash              # toggle comment
      Alt-LeftBrace: Ctrl-LeftBrace      # outdent
      Alt-RightBrace: Ctrl-RightBrace    # indent
      Alt-g: Ctrl-g                      # go to line / find next
      Alt-h: Super-h                     # hide/minimize window (macOS Cmd+H)
      Alt-Shift-p: Ctrl-Shift-p         # command palette
      Alt-Shift-f: Ctrl-Shift-f         # search in files
      Alt-Shift-o: Ctrl-Shift-o         # go to symbol
      Alt-Shift-k: Ctrl-Shift-k         # delete line
      Alt-Shift-l: Ctrl-Shift-l         # select all occurrences
      Alt-Shift-h: Ctrl-Shift-h         # replace in files
      Alt-Shift-Backslash: Ctrl-Shift-Backslash  # go to matching bracket

      # Window management (routed to Hyprland via Super)
      Alt-m: Super-m                             # minimize window
      Alt-Grave: Super-Grave                     # cycle windows

      # Browser / links
      Alt-r: Ctrl-r          # reload
      Alt-l: Ctrl-l          # address bar / select line
      Alt-d: Ctrl-d          # bookmark / add to selection
      Alt-k: Ctrl-k          # insert link
      Alt-Shift-v: Ctrl-Shift-v  # paste without formatting

      # Tab navigation
      Alt-Shift-RightBrace: Ctrl-PageDown  # next tab
      Alt-Shift-LeftBrace: Ctrl-PageUp     # previous tab

      # Text navigation (Cmd+arrow -> Home/End)
      Alt-Left: Home                # beginning of line
      Alt-Right: End                # end of line
      Alt-Up: Ctrl-Home             # top of document
      Alt-Down: Ctrl-End            # bottom of document
      # Workspace navigation (Shift+Alt -> Super for Hyprland)
      Alt-Shift-Left: Super-Left
      Alt-Shift-Right: Super-Right
      Alt-Backspace: [Shift-Home, Delete]  # delete to line start
      Alt-e: Ctrl-e
      Alt-Enter: Ctrl-Enter    # alt+enter -> ctrl+enter
      Alt-BTN_LEFT: Ctrl-BTN_LEFT  # alt+click -> ctrl+click (open links)

      # Note: Multi-cursor (Ctrl+Alt+Up/Down) and dev tools (Ctrl+Shift+I/J)
      # already work natively on Linux — no remapping needed.
      # Omarchy uses Super+Alt for group management, so we avoid that combo.
