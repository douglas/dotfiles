keypress_delay_ms: 5

# macOS Cmd key via F18 (xremap virtual_modifiers)
#
# Setup:
#   1. Via (Keychron Q11): Map your "Cmd" thumb key to F18
#   2. xremap virtual_modifiers: treats F18 as a custom modifier
#   3. xremap keymap: translates Cmd combos to Ctrl (apps) or Super (WM)
#   4. Hyprland: No changes needed
#   5. Left ALT is free for native text navigation

virtual_modifiers:
  - F18

modmap:
  - name: Key remaps
    remap:
      KEY_102ND: Shift_L
      CapsLock: Ctrl_L

keymap:
  # ============================================================
  # Global — lcctop session picker
  # ============================================================
  - name: lcctop
    remap:
      F18-Home: { launch: ["setsid", "uwsm-app", "--", "ghostty", "--class=org.omarchy.Lcctop", "--title=lcctop", "-e", "/home/douglas/.local/bin/lcctop-pick-bt"] }

  # ============================================================
  # Terminal (Ghostty) — Cmd key (F18)
  # ============================================================
  - name: Terminal shortcuts (Cmd)
    application:
      only: [com.mitchellh.ghostty, io.github.douglas.cmux_gtk]
    remap:
      # App launcher
      F18-Space: Super-Space
      F18-Shift-Space: Super-Alt-Space

      # Clipboard (Ctrl+Shift to avoid terminal control chars)
      F18-c: Ctrl-Shift-c
      F18-v: Ctrl-Shift-v
      F18-Shift-v: Super-Ctrl-v

      # Tab & window management
      F18-t: Ctrl-Shift-t
      F18-w: Ctrl-Shift-w
      F18-n: Ctrl-Shift-n
      F18-q: { launch: ["hyprctl", "dispatch", "killactive"] }

      # Split Creation
      F18-Shift-t: Ctrl-Shift-O
      F18-Ctrl-Right: Ctrl-Shift-O
      F18-Ctrl-Down: Ctrl-Shift-E

      # Split Navigation
      F18-Shift-Left: Ctrl-Alt-Left
      F18-Shift-Right: Ctrl-Alt-Right
      F18-Shift-Up: Ctrl-Alt-Up
      F18-Shift-Down: Ctrl-Alt-Down

      # Actions
      F18-a: Ctrl-Shift-a
      F18-f: Ctrl-Shift-f
      F18-g: Ctrl-Shift-g
      F18-k: Ctrl-Shift-k

      # Text editing
      F18-Backspace: Ctrl-u

      # Font size
      F18-Equal: Ctrl-Equal
      F18-Minus: Ctrl-Minus
      F18-0: Ctrl-0

      # Settings
      F18-Comma: Ctrl-Comma
      F18-Shift-Comma: Ctrl-Shift-Comma

      # Text navigation (Cmd+arrows = Home/End like macOS)
      F18-Left: Home
      F18-Right: End

      # Workspace navigation (Cmd+Win+arrows or Cmd+Ctrl+arrows)
      F18-Super-Left: Super-Shift-Tab
      F18-Super-Right: Super-Tab
      F18-Ctrl-Left: Super-Shift-Tab
      F18-Ctrl-Right: Super-Tab

      # Tab navigation
      Alt-Left: Ctrl-Shift-Left
      Alt-Right: Ctrl-Shift-Right
      Ctrl-Left: Ctrl-Shift-Left
      Ctrl-Right: Ctrl-Shift-Right

      # Fullscreen & mouse
      F18-Enter: Ctrl-Enter
      F18-BTN_LEFT: Ctrl-BTN_LEFT

      # Workspace switching
      F18-1: Alt-1
      F18-2: Alt-2
      F18-3: Alt-3
      F18-4: Alt-4
      F18-5: Alt-5
      F18-6: Alt-6
      F18-7: Alt-7
      F18-8: Alt-8
      F18-9: Alt-9

      # macOS-like screenshots (Cmd+Shift+3/4/5)
      F18-Shift-3: { launch: ["omarchy-cmd-screenshot", "fullscreen"] }
      F18-Shift-4: { launch: ["omarchy-cmd-screenshot", "region"] }
      F18-Shift-5: { launch: ["omarchy-menu", "capture"] }

  # ============================================================
  # Terminal (Kitty) — split navigation via F18+Shift+arrows
  # ============================================================
  - name: Terminal shortcuts Kitty (Cmd)
    application:
      only: [kitty]
    remap:
      F18-Shift-Left:  Ctrl-Alt-Left
      F18-Shift-Right: Ctrl-Alt-Right
      F18-Shift-Up:    Ctrl-Alt-Up
      F18-Shift-Down:  Ctrl-Alt-Down

  # ============================================================
  # Spotify
  # ============================================================
  - name: Spotify shortcuts (Cmd)
    application:
      only: [spotify]
    remap:
      F18-q: Ctrl-Shift-q
      F18-w: Ctrl-Shift-q

  # ============================================================
  # All other apps — Cmd key (F18)
  # ============================================================
  - name: macOS-style shortcuts (Cmd)
    application:
      not: [com.mitchellh.ghostty, io.github.douglas.cmux_gtk, spotify]
    remap:
      # App launcher
      F18-Space: Super-Space
      F18-Shift-Space: Super-Alt-Space

      # macOS-like screenshots (Cmd+Shift+3/4/5)
      F18-Shift-3: { launch: ["omarchy-cmd-screenshot", "fullscreen"] }
      F18-Shift-4: { launch: ["omarchy-cmd-screenshot", "region"] }
      F18-Shift-5: { launch: ["omarchy-menu", "capture"] }

      # Clipboard
      F18-c: Ctrl-c
      F18-v: Ctrl-v
      F18-x: Ctrl-x

      # Common actions
      F18-z: Ctrl-z
      F18-Shift-z: Ctrl-Shift-z
      F18-a: Ctrl-a
      F18-f: Ctrl-f
      F18-s: Ctrl-s
      F18-Shift-s: Ctrl-Shift-s
      F18-o: Ctrl-o
      F18-p: Ctrl-p
      F18-n: Ctrl-n
      F18-q: { launch: ["hyprctl", "dispatch", "killactive"] }
      F18-w: Ctrl-w
      F18-t: Ctrl-t
      F18-Shift-t: Ctrl-Shift-t
      F18-Shift-n: Ctrl-Shift-n
      F18-Comma: Ctrl-Comma

      # Text formatting
      F18-b: Ctrl-b
      F18-i: Ctrl-i
      F18-u: Ctrl-u

      # Editor shortcuts
      F18-Slash: Ctrl-Slash
      F18-LeftBrace: Ctrl-LeftBrace
      F18-RightBrace: Ctrl-RightBrace
      F18-g: Ctrl-g
      F18-Shift-p: Ctrl-Shift-p
      F18-Shift-f: Ctrl-Shift-f
      F18-Shift-o: Ctrl-Shift-o
      F18-Shift-k: Ctrl-Shift-k
      F18-Shift-l: Ctrl-Shift-l
      F18-Shift-h: Ctrl-Shift-h
      F18-Shift-Backslash: Ctrl-Shift-Backslash

      # Browser / links
      F18-r: Ctrl-r
      F18-l: Ctrl-l
      F18-d: Ctrl-d
      F18-k: Ctrl-k
      F18-e: Ctrl-e
      F18-Enter: Ctrl-Enter
      F18-BTN_LEFT: Ctrl-BTN_LEFT

      # Tab navigation
      F18-Shift-RightBrace: Ctrl-PageDown
      F18-Shift-LeftBrace: Ctrl-PageUp

      # Text navigation (Cmd+arrows = Home/End like macOS)
      F18-Left: Home
      F18-Right: End
      F18-Backspace: [Shift-Home, Delete]

      # Workspace navigation (Cmd+Win+arrows or Cmd+Ctrl+arrows)
      F18-Super-Left: Super-Shift-Tab
      F18-Super-Right: Super-Tab
      F18-Ctrl-Left: Super-Shift-Tab
      F18-Ctrl-Right: Super-Tab

      # Tab navigation
      Alt-Left: Ctrl-PageUp
      Alt-Right: Ctrl-PageDown
      Ctrl-Left: Ctrl-PageUp
      Ctrl-Right: Ctrl-PageDown

      # Clipboard manager (Omarchy)
      F18-Shift-v: Super-Ctrl-v

      # WM shortcuts (routed to Super for Hyprland)
      F18-h: Super-h
      F18-m: Super-m
      F18-Grave: Super-Grave

      # Window swap
      # F18-Shift-Left: Shift-Home
      # F18-Shift-Right: Shift-End
      # F18-Shift-Up: Shift-PageUp
      # F18-Shift-Down: Shift-PageDown

      # Workspace navigation
      F18-Tab: Super-Tab
      F18-Shift-Tab: Super-Shift-Tab

      # Window management
      F18-j: Super-j

      # macOS-like screenshots (Cmd+Shift+3/4/5)
      F18-Shift-3: { launch: ["omarchy-cmd-screenshot", "fullscreen"] }
      F18-Shift-4: { launch: ["omarchy-cmd-screenshot", "region"] }
      F18-Shift-5: { launch: ["omarchy-menu", "capture"] }
