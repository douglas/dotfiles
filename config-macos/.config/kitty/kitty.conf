# Catppuccin Mocha
foreground              #CDD6F4
background              #1E1E2E
selection_foreground    #1E1E2E
selection_background    #F5E0DC
cursor                  #F5E0DC
cursor_text_color       #1E1E2E
url_color               #74C7EC
active_tab_foreground   #1E1E2E
active_tab_background   #CBA6F7
inactive_tab_foreground #CDD6F4
inactive_tab_background #313244
tab_bar_background      #181825
color0  #45475A
color1  #F38BA8
color2  #A6E3A1
color3  #F9E2AF
color4  #89B4FA
color5  #F5C2E7
color6  #94E2D5
color7  #BAC2DE
color8  #585B70
color9  #F38BA8
color10 #A6E3A1
color11 #F9E2AF
color12 #89B4FA
color13 #F5C2E7
color14 #94E2D5
color15 #A6ADC8

# Font
font_family CommitMono Nerd Font
bold_italic_font auto

# Window
window_padding_width 14
macos_titlebar_color background
hide_window_decorations titlebar-only
confirm_os_window_close 0
include ~/.config/kitty/machine.conf

# Keybindings
map cmd+c copy_to_clipboard
map cmd+v paste_from_clipboard
map shift+return send_text normal \x1b\r
map cmd+enter toggle_fullscreen
map cmd+left previous_tab
map cmd+right next_tab
map ctrl+alt+1 goto_tab 1
map ctrl+alt+2 goto_tab 2
map ctrl+alt+3 goto_tab 3
map ctrl+alt+4 goto_tab 4
map ctrl+alt+5 goto_tab 5
map ctrl+alt+6 goto_tab 6
map ctrl+alt+7 goto_tab 7
map ctrl+alt+8 goto_tab 8
map ctrl+alt+9 goto_tab 9

# Splits (native Kitty leader key)
enabled_layouts splits,tall,fat,grid,horizontal,vertical
map ctrl+k>right launch --location=vsplit --cwd=current
map ctrl+k>left  launch --location=vsplit --cwd=current
map ctrl+k>up    launch --location=hsplit --cwd=current
map ctrl+k>down  launch --location=hsplit --cwd=current
map ctrl+k>shift+right neighboring_window right
map ctrl+k>shift+left  neighboring_window left
map ctrl+k>shift+up    neighboring_window up
map ctrl+k>shift+down  neighboring_window down
map ctrl+k>l neighboring_window right
map ctrl+k>h neighboring_window left
map ctrl+k>k neighboring_window up
map ctrl+k>j neighboring_window down
map ctrl+alt+left  neighboring_window left
map ctrl+alt+right neighboring_window right
map ctrl+alt+up    neighboring_window up
map ctrl+alt+down  neighboring_window down

# Allow remote access
allow_remote_control yes

# Aesthetics
cursor_shape block
cursor_blink_interval 0
shell_integration no-cursor
enable_audio_bell no

# Tab bar
tab_bar_edge                bottom
tab_bar_style               powerline
tab_powerline_style         slanted
tab_title_template          {title}{' :{}:'.format(num_windows) if num_windows > 1 else ''}
