vimcmd_visual_symbol = '[ <](bold fg:lavender)'

[custom.dox_sandbox]
command = "dox-sandbox-info"
when = true
unsafe_no_escape = true
format = "[$output](bold)"
shell = ["bash", "--norc", "--noprofile"]

