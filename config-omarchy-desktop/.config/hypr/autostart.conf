# Extra autostart processes
# exec-once = uwsm-app -- my-service

# Start Quickshell from Omarchy's profile autostart hook so its tray watcher is
# available before XDG autostart apps register their tray icons.
exec-once = uwsm-app -- qs -n

# >>> Neo Quickshell autostart
# Quickshell provides Neo's native notification server.
exec-once = pkill mako || true
exec-once = neosh-restart-quickshell
# <<< Neo Quickshell autostart
