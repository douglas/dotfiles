# Desktop-specific personal Hyprland overrides.

# Profile plugins are loaded dynamically from local source builds.
exec-once = hyprctl plugin load /home/douglas/src/hyprtasking/build/libhyprtasking.so

plugin:hyprtasking:debug:drag_trace = 0
plugin:hyprtasking:layout = grid
plugin:hyprtasking:gestures:enabled = 1
plugin:hyprtasking:gestures:open_fingers = 3
plugin:hyprtasking:gestures:move_fingers = 4
plugin:hyprtasking:gestures:open_positive = 1

# Shared personal overrides
source = ~/.config/hypr/personal-common.conf

# Keep plugin bindings in a separate file for easier tweaks. Source them after
# plugin startup so Hyprland does not validate hyprtasking dispatchers too early.
exec = hyprctl keyword source /home/douglas/.config/hypr/personal-hyprtasking.conf
