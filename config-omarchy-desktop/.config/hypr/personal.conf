# Desktop-specific personal Hyprland overrides.

# Plugin declarations live in shared config-omarchy personal-profile.conf.
plugin:hyprtasking:debug:drag_trace = 0
plugin:hyprtasking:layout = grid
plugin:hyprtasking:gestures:enabled = 1
plugin:hyprtasking:gestures:open_fingers = 3
plugin:hyprtasking:gestures:move_fingers = 4
plugin:hyprtasking:gestures:open_positive = 1

# Shared personal overrides
source = ~/.config/hypr/personal-common.conf

# Keep plugin bindings in a separate file for easier tweaks.
source = ~/.config/hypr/personal-hyprtasking.conf
