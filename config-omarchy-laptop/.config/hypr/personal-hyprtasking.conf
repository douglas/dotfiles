# Hyprtasking keybindings — loaded once via exec-once to avoid submap stacking on reload.
# See: https://github.com/douglas/hyprtasking

unbind = CTRL, UP
unbind = CTRL, DOWN
bindd = CTRL, UP, Mission Control, exec, hyprctl dispatch hyprtasking:toggle all
bindd = CTRL, DOWN, Mission Control, exec, hyprctl dispatch hyprtasking:toggle all

# Bare key bindings must go inside the hyprtasking submap.
# The plugin enters/exits this submap automatically when the overview opens/closes.
submap = hyprtasking
bind = , LEFT,   exec, hyprctl dispatch hyprtasking:select left
bind = , RIGHT,  exec, hyprctl dispatch hyprtasking:select right
bind = , UP,     exec, hyprctl dispatch hyprtasking:select up
bind = , DOWN,   exec, hyprctl dispatch hyprtasking:select down
bind = , 1, exec, hyprctl dispatch hyprtasking:select 1
bind = , 2, exec, hyprctl dispatch hyprtasking:select 2
bind = , 3, exec, hyprctl dispatch hyprtasking:select 3
bind = , 4, exec, hyprctl dispatch hyprtasking:select 4
bind = , 5, exec, hyprctl dispatch hyprtasking:select 5
bind = , 6, exec, hyprctl dispatch hyprtasking:select 6
bind = , 7, exec, hyprctl dispatch hyprtasking:select 7
bind = , 8, exec, hyprctl dispatch hyprtasking:select 8
bind = , 9, exec, hyprctl dispatch hyprtasking:select 9
bind = , RETURN, exec, hyprctl dispatch hyprtasking:commit
bind = , ESCAPE, exec, hyprctl dispatch hyprtasking:toggle cursor
submap = reset
