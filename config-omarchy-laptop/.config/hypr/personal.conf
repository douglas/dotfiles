# Laptop-specific personal Hyprland overrides.

# Laptop-only plugin.
exec-once = hyprctl plugin load /home/douglas/src/hyprland-easymotion/hypreasymotion.so

plugin {
  hyprtasking {
    debug:trace = 1
    gestures:enabled = 1
    gestures:open_fingers = 3
    gestures:move_fingers = 4
    gestures:open_positive = 1  # swipe up = open, swipe down = close

    grid {
      rows = 3
      cols = 3
    }
  }
}
