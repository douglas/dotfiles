# Laptop-specific personal Hyprland overrides.

# Plugins only available on laptop
plugin = /home/douglas/src/hyprtasking/build/libhyprtasking.so
plugin = /home/douglas/src/hyprland-easymotion/hypreasymotion.so

plugin {
  hyprtasking {
    debug:trace = 1
    gestures:enabled = 1
    gestures:open_fingers = 4
    gestures:move_fingers = 3
    gestures:open_positive = 1  # swipe up = open, swipe down = close

    grid {
      rows = 3
      cols = 3
    }
  }
}

source = ~/.config/hypr/personal-hyprtasking.conf
