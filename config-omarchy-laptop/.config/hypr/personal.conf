# Laptop-specific personal Hyprland overrides.

# Plugin declarations live in shared config-omarchy personal-profile.conf.

plugin {
  hyprtasking {
    debug:trace = 1
    gestures:enabled = 1
    gestures:open_fingers = 4
    gestures:move_fingers = 3
    gestures:open_positive = 1  # swipe up = open, swipe down = close

    grid {
      rows = 3
      cols = 3
    }
  }
}

source = ~/.config/hypr/personal-hyprtasking.conf
