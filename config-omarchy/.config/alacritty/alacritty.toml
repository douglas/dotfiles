general.import = [
  "~/.config/omarchy/current/theme/alacritty.toml",
  "~/.config/alacritty/machine.toml",
]

[env]
TERM = "xterm-256color"

[terminal]
osc52 = "CopyPaste"

[font]
normal = { family = "CommitMono Nerd Font" }
bold = { family = "CommitMono Nerd Font" }
italic = { family = "CommitMono Nerd Font" }

[cursor]
style = { shape = "Block", blinking = "Never" }

[window]
padding.x = 14
padding.y = 14
decorations = "None"

# Note: Ghostty splits (ctrl+k leader bindings) have no native Alacritty equivalent.
# Use tmux or zellij for split pane support.
[keyboard]
bindings = [
{ key = "Insert", mods = "Shift", action = "Paste" },
{ key = "Insert", mods = "Control", action = "Copy" },
{ key = "Return", mods = "Super", action = "ToggleFullscreen" },
  { key = "Return", mods = "Shift", chars = "\u001B\r" }
]
