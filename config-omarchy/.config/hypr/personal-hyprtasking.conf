# Hyprtasking binds for CURRENT branch (/home/douglas/src/hyprtasking).
# This file targets submap-based dispatchers.
# Legacy dispatchers hyprtasking:if_active / hyprtasking:if_not_active are available on this fork.

# Primary overview toggle
unbind = CTRL, UP
unbind = CTRL, DOWN
unbind = , mouse:275
bindd = CTRL, UP, Mission Control, hyprtasking:toggle, all
bindd = CTRL, DOWN, Mission Control, hyprtasking:toggle, all
bind = , mouse:275, hyprtasking:toggle, all

# Overview-only navigation submap
submap = hyprtasking
unbind = , LEFT
unbind = , RIGHT
unbind = , UP
unbind = , DOWN
unbind = , 1
unbind = , 2
unbind = , 3
unbind = , 4
unbind = , 5
unbind = , 6
unbind = , 7
unbind = , 8
unbind = , 9
unbind = , RETURN
unbind = , ESCAPE
bind = , LEFT, hyprtasking:select, left
bind = , RIGHT, hyprtasking:select, right
bind = , UP, hyprtasking:select, up
bind = , DOWN, hyprtasking:select, down
bind = , 1, hyprtasking:select, 1
bind = , 2, hyprtasking:select, 2
bind = , 3, hyprtasking:select, 3
bind = , 4, hyprtasking:select, 4
bind = , 5, hyprtasking:select, 5
bind = , 6, hyprtasking:select, 6
bind = , 7, hyprtasking:select, 7
bind = , 8, hyprtasking:select, 8
bind = , 9, hyprtasking:select, 9
bind = , RETURN, hyprtasking:commit,
bind = , ESCAPE, hyprtasking:toggle, cursor
submap = reset

