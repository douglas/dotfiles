# Shared personal Hyprland overrides for all Omarchy profiles.

# Shared local plugins (desktop + laptop)
plugin = /home/douglas/src/hyprtasking/build/libhyprtasking.so
# Temporarily disable easymotion while triaging Hyprland crashes. It has
# appeared in prior coredumps, whereas hyprtasking currently tracks 0.54.3.
# plugin = /home/douglas/src/hyprland-easymotion/hypreasymotion.so

input {
  touchpad {
    natural_scroll = true
  }
}

# Quickshell overlays
unbind = SUPER CTRL, O
unbind = SUPER CTRL, P
bind = SUPER CTRL, O, exec, quickshell ipc call openPictures handle
bind = SUPER CTRL, F, exec, quickshell ipc call openDownloads handle
bind = SUPER CTRL, P, exec, /home/douglas/.local/bin/nika-copy-latest-picture
windowrule = match:title ^Quickshell Recent Files$, float on, size 980 600, center on, pin on, no_shadow on

# Profile-specific additions live in personal.conf from the active profile
# package (config-omarchy-desktop or config-omarchy-laptop).
source = ~/.config/hypr/personal.conf
