# Shared personal Hyprland profile entrypoint.

# Hyprtasking is available on every Omarchy profile.
exec-once = hyprctl plugin load $HOME/src/hyprtasking/build/libhyprtasking.so

# Easymotion is profile-specific and should only be loaded by the laptop profile.
# Temporarily disable easymotion while triaging Hyprland crashes. It has
# appeared in prior coredumps, whereas hyprtasking currently tracks 0.54.3.
# plugin = /home/douglas/src/hyprland-easymotion/hypreasymotion.so

input {
  touchpad {
    natural_scroll = true
  }
}

# Quickshell overlays
exec-once = systemctl --user mask --now mako.service || true

unbind = SUPER, COMMA
unbind = SUPER SHIFT, COMMA
unbind = SUPER CTRL, COMMA
unbind = SUPER ALT, COMMA
unbind = SUPER SHIFT ALT, COMMA
unbind = SUPER CTRL, C
unbind = SUPER CTRL, D
unbind = SUPER CTRL, F
unbind = SUPER CTRL, O
unbind = SUPER CTRL, P
bind = SUPER, COMMA, exec, quickshell ipc call dismissLastNotification handle
bind = SUPER SHIFT, COMMA, exec, quickshell ipc call clearNotifications handle
bind = SUPER CTRL, COMMA, exec, quickshell ipc call toggleDnd handle
bind = SUPER ALT, COMMA, exec, quickshell ipc call openNotifications handle
bind = SUPER SHIFT ALT, COMMA, exec, quickshell ipc call openNotifications handle
bind = SUPER CTRL, C, exec, quickshell ipc call openCctop handle
bind = SUPER CTRL, O, exec, quickshell ipc call openPictures handle
bind = SUPER CTRL, D, exec, quickshell ipc call openDownloads handle
bind = SUPER CTRL, P, exec, $HOME/.local/bin/neosh-copy-latest-picture
windowrule = match:title ^Quickshell Recent Files$, float on, size 980 600, center on, pin on, no_shadow on

# Shared personal overrides
source = ~/.config/hypr/personal-common.conf

# Profile-specific additions live in personal.conf from the active profile
# package (config-omarchy-desktop or config-omarchy-laptop).
source = ~/.config/hypr/personal.conf

# Source plugin bindings after profile settings so Hyprland does not validate
# hyprtasking dispatchers before the plugin has loaded.
exec = hyprctl keyword source $HOME/.config/hypr/personal-hyprtasking.conf
