# Personal Hyprland overrides — not managed by Omarchy
# Keep personal customizations here so Omarchy updates can safely modify the standard files.

# fcitx5 input method (dead keys, compose, cedilla)
env = QT_IM_MODULE,fcitx
env = XMODIFIERS,@im=fcitx
env = INPUT_METHOD,fcitx

# Keyboard layout and variant
input {
  kb_variant = intl
  kb_layout = us

  # Natural scroll for mouse
  natural_scroll = true

  touchpad {
    natural_scroll = true
    clickfinger_behavior = true
  }
}

# Gestures
gesture = 4, horizontal, workspace
gesture = 4, vertical, fullscreen
gesture = 3, swipe, move

# Hyprland actions triggered by xremap (F18 → Super remaps)
unbind = SUPER, W
bindd = SUPER, H, Hide/minimize window, movetoworkspacesilent, special:minimized
bindd = SUPER, M, Minimize window, movetoworkspacesilent, special:minimized
bindd = SUPER, GRAVE, Cycle windows, cyclenext,

# Easymotion
bind = SUPER, z, easymotion, action:hyprctl dispatch focuswindow address:{}

# Screenshot with file path to clipboard (for pasting into Claude Code / Codex)
bindd = SHIFT, PRINT, Screenshot (path to clipboard), exec, screenshot-to-clipboard-path

# Hyprtasking
plugin = /home/douglas/src/hyprtasking-main/build/libhyprtasking.so
bindd = CTRL, UP, Mission Control, hyprtasking:toggle, all
bindd = CTRL, DOWN, Mission Control, hyprtasking:toggle, all
bind = , LEFT, hyprtasking:if_active, hyprtasking:move left
bind = , RIGHT, hyprtasking:if_active, hyprtasking:move right
bind = , UP, hyprtasking:if_active, hyprtasking:move up
bind = , DOWN, hyprtasking:if_active, hyprtasking:move down
bind = , RETURN, hyprtasking:if_active, hyprtasking:toggle cursor
bind = , mouse:275, hyprtasking:toggle, all

# Hyprlock overrides
auth {
    fingerprint:enabled = true
}

# Autostart
exec-once = hyprpm reload

# Persistent workspaces (always exist, even when empty)
workspace = 1, persistent:true
workspace = 2, persistent:true
workspace = 3, persistent:true
workspace = 4, persistent:true
workspace = 5, persistent:true
workspace = 6, persistent:true
workspace = 7, persistent:true
workspace = 8, persistent:true
workspace = 9, persistent:true
