include ~/.config/omarchy/current/theme/kitty.conf

# Font
font_family CommitMono Nerd Font
bold_italic_font auto
font_size        10.5

# Window
window_padding_width 14
hide_window_decorations yes
confirm_os_window_close 0
initial_window_width  186c
initial_window_height 62c

# Keybindings
map ctrl+insert copy_to_clipboard
map shift+insert paste_from_clipboard
map shift+return send_text normal \x1b\r

# Splits (native Kitty leader key)
enabled_layouts splits,tall,fat,grid,horizontal,vertical
map ctrl+k>right launch --location=vsplit --cwd=current
map ctrl+k>left  launch --location=vsplit --cwd=current
map ctrl+k>up    launch --location=hsplit --cwd=current
map ctrl+k>down  launch --location=hsplit --cwd=current
map ctrl+k>l neighboring_window right
map ctrl+k>h neighboring_window left
map ctrl+k>k neighboring_window up
map ctrl+k>j neighboring_window down
# Also available via xremap F18 shortcuts:
map ctrl+shift+o launch --location=vsplit --cwd=current
map ctrl+shift+e launch --location=hsplit --cwd=current
map ctrl+alt+left  neighboring_window left
map ctrl+alt+right neighboring_window right
map ctrl+alt+up    neighboring_window up
map ctrl+alt+down  neighboring_window down

# Allow remote access
allow_remote_control yes

# Aesthetics
cursor_shape block
cursor_blink_interval 0
shell_integration no-cursor
enable_audio_bell no

# Minimal Tab bar styling
tab_bar_edge                bottom
tab_bar_style               powerline
tab_powerline_style         slanted
tab_title_template          {title}{' :{}:'.format(num_windows) if num_windows > 1 else ''}
